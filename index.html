<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FUZE — BTL Division | Brand Activations & Experiential Marketing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8711A;
  --orange-dark:#C55D0E;
  --orange-light:#F5903A;
  --orange-pale:#FDF0E6;
  --dark:#1A1A1A;
  --dark2:#2C2C2C;
  --mid:#555555;
  --muted:#888888;
  --border:#E5E5E5;
  --bg:#FFFFFF;
  --bg2:#F8F8F8;
  --bg3:#F2F2F2;
  --white:#FFFFFF;
  --font:'Inter',sans-serif;
  --display:'Barlow Condensed',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--dark);overflow-x:hidden;line-height:1.6}
::selection{background:var(--orange);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:var(--orange);border-radius:2px}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes scroll-logos{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fade-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes dash{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.container{max-width:1200px;margin:0 auto;padding:0 28px}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';width:24px;height:2px;background:var(--orange);display:inline-block;flex-shrink:0}
.section-title{font-family:var(--display);font-size:clamp(2.2rem,4.5vw,3.8rem);font-weight:900;line-height:1.05;color:var(--dark);letter-spacing:-0.5px}
.section-title .accent{color:var(--orange)}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--orange);color:#fff;padding:14px 28px;border-radius:4px;font-size:14px;font-weight:700;letter-spacing:0.5px;cursor:pointer;border:none;transition:all 0.22s;text-decoration:none;text-transform:uppercase}
.btn-primary:hover{background:var(--orange-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,113,26,0.3)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--dark);padding:13px 28px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid var(--dark);transition:all 0.22s;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px}
.btn-outline:hover{background:var(--dark);color:#fff}
.btn-outline-white{display:inline-flex;align-items:center;gap:8px;background:transparent;color:#fff;padding:13px 28px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid rgba(255,255,255,0.5);transition:all 0.22s;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px}
.btn-outline-white:hover{background:#fff;color:var(--dark)}

/* IMAGE PLACEHOLDER */
.img-placeholder{background:var(--bg3);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s}
.img-placeholder::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(232,113,26,0.04) 100%)}
.img-placeholder:hover{border-color:var(--orange);background:#FDF5EE}
.img-placeholder svg{color:var(--muted);transition:color 0.2s}
.img-placeholder:hover svg{color:var(--orange)}
.img-placeholder span{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:0.5px;text-align:center;padding:0 16px}
.img-placeholder .upload-hint{font-size:11px;color:var(--orange);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0;transition:all 0.3s}
.navbar.scrolled{background:#fff;box-shadow:0 1px 0 var(--border)}
.navbar-inner{display:flex;align-items:center;justify-content:space-between;height:72px;gap:24px}
.logo{display:flex;align-items:center;gap:0;text-decoration:none;flex-shrink:0}
.logo-svg{height:36px;width:auto}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{font-size:13px;font-weight:600;color:var(--mid);text-decoration:none;letter-spacing:0.3px;transition:color 0.2s;text-transform:uppercase}
.nav-links a:hover{color:var(--orange)}
.nav-toggle{display:none;background:none;border:none;cursor:pointer;color:var(--dark)}
@media(max-width:900px){.nav-links,.navbar .btn-primary{display:none}.nav-toggle{display:block}}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;background:var(--dark);position:relative;overflow:hidden;padding:100px 0 80px}
.hero-bg-pattern{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
.hero-accent{position:absolute;right:-100px;top:50%;transform:translateY(-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(232,113,26,0.12) 0%,transparent 70%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:80px;align-items:center;position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(232,113,26,0.12);border:1px solid rgba(232,113,26,0.3);border-radius:2px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--orange-light);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.hero-tag .dot{width:6px;height:6px;background:var(--orange);border-radius:50%;animation:pulse 2s infinite}
.hero-h1{font-family:var(--display);font-size:clamp(3rem,6.5vw,5.5rem);font-weight:900;line-height:0.98;color:#fff;letter-spacing:-1px;margin-bottom:28px;text-transform:uppercase}
.hero-h1 .accent{color:var(--orange)}
.hero-sub{font-size:16px;color:rgba(255,255,255,0.6);line-height:1.75;margin-bottom:40px;max-width:460px}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap}
.hero-stats{display:flex;gap:40px;margin-top:56px;padding-top:40px;border-top:1px solid rgba(255,255,255,0.1)}
.hero-stat-num{font-family:var(--display);font-size:36px;font-weight:900;color:#fff;line-height:1}
.hero-stat-label{font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:0.5px;margin-top:4px;font-weight:500;text-transform:uppercase}
.hero-img-area{position:relative}
.hero-main-img{border-radius:4px;overflow:hidden;aspect-ratio:4/3}
.hero-float-card{position:absolute;background:#fff;border-radius:4px;padding:14px 18px;box-shadow:0 20px 60px rgba(0,0,0,0.25)}
.hero-float-card-1{bottom:-20px;left:-30px;animation:float 4s ease-in-out infinite}
.hero-float-card-2{top:-16px;right:-20px;animation:float 5s ease-in-out infinite 1s}
.fc-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.fc-val{font-family:var(--display);font-size:22px;font-weight:900;color:var(--dark)}
.fc-change{font-size:11px;color:#00a76f;font-weight:600;margin-top:2px}
.fc-bar{display:flex;gap:3px;align-items:flex-end;height:28px;margin-top:8px}
.fc-b{width:8px;background:var(--orange);border-radius:2px 2px 0 0;opacity:0.7;transition:opacity 0.2s}
.fc-b.active{opacity:1}
@media(max-width:900px){.hero-grid{grid-template-columns:1fr;gap:48px}.hero-img-area{display:none}}

/* TRUST BAR */
.trust-bar{padding:40px 0;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden}
.trust-label{text-align:center;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:28px;font-weight:600}
.logos-track{display:flex;gap:72px;width:max-content;animation:scroll-logos 28s linear infinite}
.logo-item{font-family:var(--display);font-size:20px;font-weight:900;color:rgba(26,26,26,0.2);letter-spacing:1px;white-space:nowrap;text-transform:uppercase;transition:color 0.3s}
.logo-item:hover{color:var(--orange)}

/* ABOUT SECTION — Why FUZE */
.about-section{padding:120px 0;background:#fff}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-img-stack{position:relative;height:520px}
.about-img-main{position:absolute;top:0;left:0;right:80px;bottom:80px;border-radius:4px;overflow:hidden}
.about-img-accent{position:absolute;bottom:0;right:0;width:220px;height:220px;border-radius:4px;overflow:hidden;border:4px solid #fff}
.about-orange-bar{position:absolute;top:40px;left:-20px;width:6px;height:120px;background:var(--orange);border-radius:3px}
.about-content .section-title{margin-bottom:24px}
.about-content p{font-size:15px;color:var(--mid);line-height:1.8;margin-bottom:20px}
.value-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:32px}
.value-card{padding:16px 20px;border:1px solid var(--border);border-radius:4px;transition:all 0.25s;cursor:default;border-left:3px solid transparent}
.value-card:hover{border-left-color:var(--orange);background:var(--orange-pale);transform:translateX(4px)}
.vc-title{font-size:13px;font-weight:800;color:var(--dark);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.vc-desc{font-size:12px;color:var(--muted);line-height:1.6}
@media(max-width:900px){.about-grid{grid-template-columns:1fr}.about-img-stack{height:320px}.value-cards{grid-template-columns:1fr 1fr}}

/* SERVICES */
.services-section{padding:120px 0;background:var(--dark)}
.services-header{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end;margin-bottom:64px}
.services-header .section-title{color:#fff}
.services-header p{font-size:15px;color:rgba(255,255,255,0.5);line-height:1.75}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.svc-card{background:var(--dark2);padding:36px 32px;transition:all 0.3s;position:relative;overflow:hidden;cursor:default}
.svc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--orange);transform:scaleX(0);transition:transform 0.3s;transform-origin:left}
.svc-card:hover::after{transform:scaleX(1)}
.svc-card:hover{background:#252525}
.svc-num{font-family:var(--display);font-size:48px;font-weight:900;color:rgba(255,255,255,0.06);line-height:1;margin-bottom:16px}
.svc-icon{width:44px;height:44px;background:rgba(232,113,26,0.12);border:1px solid rgba(232,113,26,0.2);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;color:var(--orange)}
.svc-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.svc-desc{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.7}
.svc-img{margin-top:20px;border-radius:3px;overflow:hidden}
@media(max-width:900px){.services-header{grid-template-columns:1fr}.services-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.services-grid{grid-template-columns:1fr}}

/* EXECUTION MODEL */
.execution-section{padding:120px 0;background:#fff;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.execution-steps{display:grid;grid-template-columns:repeat(6,1fr);gap:0;margin-top:64px;position:relative}
.exec-step{text-align:center;position:relative;padding:0 8px}
.exec-step:not(:last-child)::after{content:'';position:absolute;top:28px;right:-12px;width:24px;height:2px;background:linear-gradient(90deg,var(--border) 0%,var(--orange) 100%);z-index:0}
.exec-circle{width:56px;height:56px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:18px;transition:all 0.3s;position:relative;z-index:1}
.exec-step:hover .exec-circle{border-color:var(--orange);background:var(--orange);color:#fff;box-shadow:0 8px 24px rgba(232,113,26,0.3)}
.exec-step:hover .exec-circle svg{color:#fff}
.exec-circle svg{color:var(--orange);transition:color 0.3s}
.exec-title{font-size:13px;font-weight:800;color:var(--dark);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.exec-desc{font-size:11px;color:var(--muted);line-height:1.6}
@media(max-width:900px){.execution-steps{grid-template-columns:repeat(3,1fr);gap:32px}.exec-step::after{display:none}}
@media(max-width:480px){.execution-steps{grid-template-columns:repeat(2,1fr)}}

/* METRICS */
.metrics-section{padding:100px 0;background:var(--orange);position:relative;overflow:hidden}
.metrics-bg{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;position:relative;z-index:1}
.metric-item{background:rgba(0,0,0,0.08);padding:48px 32px;text-align:center;transition:background 0.3s}
.metric-item:hover{background:rgba(0,0,0,0.15)}
.metric-num{font-family:var(--display);font-size:clamp(3rem,5vw,5rem);font-weight:900;color:#fff;line-height:1;margin-bottom:8px}
.metric-label{font-size:13px;color:rgba(255,255,255,0.7);font-weight:600;text-transform:uppercase;letter-spacing:1px}
@media(max-width:768px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.metrics-grid{grid-template-columns:1fr}}

/* CASE STUDIES */
.cases-section{padding:120px 0;background:#fff}
.cases-intro{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-bottom:64px}
.cases-intro p{font-size:15px;color:var(--mid);line-height:1.8}
.cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.case-card{border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:all 0.3s;cursor:default}
.case-card:hover{box-shadow:0 20px 60px rgba(0,0,0,0.08);transform:translateY(-6px)}
.case-img{aspect-ratio:16/9;position:relative;overflow:hidden}
.case-tag{position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:2px;background:var(--orange);color:#fff;z-index:2}
.case-body{padding:24px}
.case-client{font-family:var(--display);font-size:22px;font-weight:900;color:var(--dark);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.case-objective{font-size:13px;color:var(--mid);line-height:1.65;margin-bottom:20px}
.case-results{display:flex;gap:20px;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.case-result-num{font-family:var(--display);font-size:24px;font-weight:900;color:var(--orange)}
.case-result-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:600}
.case-link{font-size:12px;font-weight:700;color:var(--orange);text-decoration:none;display:inline-flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:1px;transition:gap 0.2s}
.case-link:hover{gap:10px}
@media(max-width:900px){.cases-intro{grid-template-columns:1fr}.cases-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.cases-grid{grid-template-columns:1fr}}

/* INDUSTRIES */
.industries-section{padding:120px 0;background:#fff;border-top:1px solid var(--border)}
.industries-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:56px}
.industry-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:32px 20px;text-align:center;transition:all 0.25s;cursor:default;position:relative;overflow:hidden}
.industry-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--orange);transform:scaleX(0);transition:transform 0.25s;transform-origin:center}
.industry-card:hover::before{transform:scaleX(1)}
.industry-card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.07);transform:translateY(-3px);background:#fff}
.industry-icon-box{width:52px;height:52px;border-radius:10px;background:rgba(232,113,26,0.08);border:1px solid rgba(232,113,26,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--orange);transition:all 0.25s}
.industry-card:hover .industry-icon-box{background:var(--orange);border-color:var(--orange);color:#fff}
.industry-name{font-size:13px;font-weight:800;color:var(--dark);text-transform:uppercase;letter-spacing:0.5px}
@media(max-width:768px){.industries-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.industries-grid{grid-template-columns:repeat(2,1fr)}}

/* TESTIMONIALS */
.testimonials-section{padding:120px 0;background:var(--dark)}
.testimonials-section .section-title{color:#fff}
.testi-wrapper{margin-top:56px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.testi-card{background:var(--dark2);border:1px solid rgba(255,255,255,0.07);border-radius:4px;padding:32px;transition:border-color 0.3s;position:relative}
.testi-card::before{content:'"';position:absolute;top:16px;right:24px;font-family:var(--display);font-size:80px;color:rgba(232,113,26,0.15);line-height:1;font-weight:900}
.testi-card:hover{border-color:rgba(232,113,26,0.3)}
.testi-text{font-size:14px;color:rgba(255,255,255,0.65);line-height:1.8;margin-bottom:24px;position:relative;z-index:1}
.testi-author{display:flex;align-items:center;gap:12px}
.testi-avatar{width:44px;height:44px;border-radius:50%;background:rgba(232,113,26,0.2);border:2px solid var(--orange);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--orange);flex-shrink:0;font-family:var(--display)}
.testi-name{font-size:14px;font-weight:700;color:#fff}
.testi-role{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
@media(max-width:900px){.testi-wrapper{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.testi-wrapper{grid-template-columns:1fr}}

/* ABOUT FUZE FULL */
.fuze-about-section{padding:120px 0;background:#fff}
.fuze-about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.fuze-manifesto{font-family:var(--display);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:900;line-height:1.1;color:var(--dark);text-transform:uppercase;margin-bottom:32px}
.fuze-manifesto .accent{color:var(--orange)}
.fuze-about-text p{font-size:15px;color:var(--mid);line-height:1.8;margin-bottom:16px}
.pillars{display:flex;flex-direction:column;gap:12px;margin-top:32px}
.pillar{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-left:3px solid var(--orange);background:var(--orange-pale);border-radius:0 4px 4px 0}
.pillar-icon{color:var(--orange);flex-shrink:0;margin-top:2px}
.pillar-title{font-size:13px;font-weight:800;color:var(--dark);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.pillar-desc{font-size:12px;color:var(--mid)}
.fuze-visual{position:relative;height:500px}
.fuze-img-main{position:absolute;top:0;right:0;left:60px;bottom:60px;border-radius:4px;overflow:hidden}
.fuze-img-sm{position:absolute;bottom:0;left:0;width:180px;height:180px;border-radius:4px;overflow:hidden;border:4px solid #fff;box-shadow:0 20px 60px rgba(0,0,0,0.12)}
.fuze-badge{position:absolute;top:40px;left:0;background:var(--orange);color:#fff;padding:16px 20px;border-radius:0 4px 4px 0;font-family:var(--display);font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:1px;line-height:1.2}
@media(max-width:900px){.fuze-about-grid{grid-template-columns:1fr}.fuze-visual{display:none}}

/* CTA */
.cta-section{padding:100px 0;background:var(--dark);position:relative;overflow:hidden}
.cta-bg{position:absolute;right:-200px;top:50%;transform:translateY(-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,113,26,0.1) 0%,transparent 70%);pointer-events:none}
.cta-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center}
.cta-title{font-family:var(--display);font-size:clamp(2rem,4vw,3.2rem);font-weight:900;color:#fff;text-transform:uppercase;line-height:1.05;max-width:600px}
.cta-title .accent{color:var(--orange)}
.cta-sub{font-size:15px;color:rgba(255,255,255,0.5);margin-top:16px;max-width:500px}
.cta-actions{display:flex;flex-direction:column;gap:12px;align-items:flex-end;flex-shrink:0}
@media(max-width:768px){.cta-inner{grid-template-columns:1fr}.cta-actions{align-items:flex-start}}

/* CONTACT */
.contact-section{padding:120px 0;background:#fff}
.contact-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:80px;margin-top:56px}
.contact-info-blocks{display:flex;flex-direction:column;gap:32px}
.contact-block{display:flex;gap:16px}
.contact-icon{width:48px;height:48px;border-radius:4px;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.contact-block-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:4px}
.contact-block-val{font-size:15px;font-weight:600;color:var(--dark)}
.contact-badge{margin-top:32px;padding:24px;background:var(--dark);border-radius:4px;display:flex;flex-direction:column;gap:4px}
.contact-badge-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);font-weight:600}
.contact-badge-val{font-family:var(--display);font-size:28px;font-weight:900;color:#fff}
.contact-badge-sub{font-size:12px;color:rgba(255,255,255,0.35)}
.form-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;color:var(--dark);letter-spacing:1px;text-transform:uppercase}
.form-input{background:#fff;border:1px solid var(--border);border-radius:4px;padding:12px 16px;color:var(--dark);font-size:14px;font-family:var(--font);transition:all 0.2s;outline:none;width:100%}
.form-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,113,26,0.1)}
.form-input::placeholder{color:#bbb}
select.form-input option{background:#fff;color:var(--dark)}
textarea.form-input{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.contact-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}

/* FOOTER */
.footer{padding:72px 0 32px;background:var(--dark);border-top:1px solid rgba(255,255,255,0.06)}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:48px;margin-bottom:56px}
.footer-brand p{font-size:14px;color:rgba(255,255,255,0.4);line-height:1.75;margin-top:20px;max-width:260px}
.footer-social{display:flex;gap:8px;margin-top:24px}
.footer-social a{width:36px;height:36px;border-radius:4px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;font-weight:700;transition:all 0.2s}
.footer-social a:hover{background:var(--orange);border-color:var(--orange);color:#fff}
.footer-col h4{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:20px}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:10px}
.footer-links a{font-size:14px;color:rgba(255,255,255,0.5);text-decoration:none;transition:color 0.2s;font-weight:500}
.footer-links a:hover{color:var(--orange)}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:32px;border-top:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;gap:12px}
.footer-bottom p{font-size:13px;color:rgba(255,255,255,0.25)}
.footer-bottom-links{display:flex;gap:24px}
.footer-bottom-links a{font-size:13px;color:rgba(255,255,255,0.25);text-decoration:none;transition:color 0.2s}
.footer-bottom-links a:hover{color:rgba(255,255,255,0.6)}
@media(max-width:900px){.footer-top{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.footer-top{grid-template-columns:1fr}}

/* WHATSAPP */
.wa-float{position:fixed;bottom:28px;right:28px;z-index:999;width:54px;height:54px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(37,211,102,0.4);text-decoration:none;animation:float 3s ease-in-out infinite}
.wa-float:hover{transform:scale(1.1)}

svg{display:block}
section{scroll-margin-top:72px}

/* ─── SCROLL COUNTER ─── */
function useInView(threshold=0.3){
  const ref=useRef(null);
  const [vis,setVis]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true)},{threshold});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[threshold]);
  return [ref,vis];
}
function useCount(target,dur=1800,run=false){
  const [n,setN]=useState(0);
  useEffect(()=>{
    if(!run)return;
    let start=null;
    const step=ts=>{
      if(!start)start=ts;
      const p=Math.min((ts-start)/dur,1);
      const e=1-Math.pow(1-p,3);
      setN(Math.floor(e*target));
      if(p<1)requestAnimationFrame(step);
      else setN(target);
    };
    requestAnimationFrame(step);
  },[run,target,dur]);
  return n;
}

/* ─── METRICS ─── */
function Metrics(){
  const [ref,vis]=useInView(0.3);
  const nums=[
    {target:500,suffix:'+',label:'Activations Executed'},
    {target:5,suffix:'M+',label:'Consumer Interactions',float:true},
    {target:95,suffix:'%',label:'Campaign Success Rate'},
    {target:50,suffix:'+',label:'Brand Partners'},
  ];
  const counts=nums.map(n=>useCount(n.target,1800,vis));
  return(
    <section className="metrics-section" ref={ref}>
      <div className="metrics-bg"/>
      <div className="container" style={{position:'relative',zIndex:1}}>
        <div style={{textAlign:'center',marginBottom:'56px'}}>
          <p className="eyebrow" style={{color:'rgba(255,255,255,0.5)',justifyContent:'center'}}>Our Track Record</p>
          <h2 className="section-title" style={{color:'#fff'}}>Numbers That <span style={{color:'#fff',borderBottom:'4px solid #fff',paddingBottom:'2px'}}>Speak</span></h2>
        </div>
        <div className="metrics-grid">
          {nums.map((m,i)=>(
            <div key={m.label} className="metric-item">
              <div className="metric-num">{counts[i].toLocaleString()}{m.suffix}</div>
              <div className="metric-label">{m.label}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ─── CONTACT ─── */
function Contact(){
  const [form,setForm]=useState({name:'',company:'',email:'',phone:'',service:'',budget:'',message:''});
  const [sent,setSent]=useState(false);
  const upd=k=>e=>setForm({...form,[k]:e.target.value});
  const submit=e=>{e.preventDefault();setSent(true)};
  return(
    <section className="contact-section" id="contact">
      <div className="container">
        <div style={{textAlign:'center',maxWidth:'560px',margin:'0 auto'}}>
          <p className="eyebrow" style={{justifyContent:'center'}}>Get In Touch</p>
          <h2 className="section-title">Start a <span className="accent">Conversation</span></h2>
          <p style={{color:'var(--mid)',fontSize:'15px',marginTop:'16px',lineHeight:1.75}}>Tell us about your brand, your campaign objectives, and your audience. We'll come back with a tailored strategy proposal.</p>
        </div>
        <div className="contact-grid">
          <div>
            <h3 style={{fontFamily:'var(--display)',fontSize:'24px',fontWeight:900,textTransform:'uppercase',marginBottom:'32px',letterSpacing:'0.5px'}}>Contact Details</h3>
            <div className="contact-info-blocks">
              {[{icon:<I.Phone/>,l:'Phone',v:'+254 700 000 000'},{icon:<I.Mail/>,l:'Email',v:'hello@fuze.africa'},{icon:<I.Pin/>,l:'Office',v:'Westlands Business Park, Nairobi, Kenya'}].map(c=>(
                <div key={c.l} className="contact-block">
                  <div className="contact-icon">{c.icon}</div>
                  <div><div className="contact-block-label">{c.l}</div><div className="contact-block-val">{c.v}</div></div>
                </div>
              ))}
            </div>
            <div className="contact-badge" style={{marginTop:'32px'}}>
              <div className="contact-badge-label">Average Response Time</div>
              <div className="contact-badge-val">Under 4 Hours</div>
              <div className="contact-badge-sub">During business hours, Mon–Fri</div>
            </div>
            <div style={{marginTop:'24px',borderRadius:'4px',overflow:'hidden'}}>
              <ImgPlaceholder height={160} label="Office / Team Photo" hint="Optional: adds a human touch to contact section" spec="700×320px · JPG/PNG"/>
            </div>
          </div>
          <div>
            {sent?(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',textAlign:'center',gap:'16px',padding:'48px 0'}}>
                <div style={{width:'64px',height:'64px',borderRadius:'4px',background:'var(--orange)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><I.Check/></div>
                <h3 style={{fontFamily:'var(--display)',fontSize:'28px',fontWeight:900,textTransform:'uppercase'}}>Proposal Request Sent</h3>
                <p style={{color:'var(--mid)',fontSize:'14px',lineHeight:1.7,maxWidth:'320px'}}>Our team will review your brief and get back to you within 4 business hours with a tailored strategy proposal.</p>
                <button onClick={()=>setSent(false)} className="btn-outline">Send Another</button>
              </div>
            ):(
              <form onSubmit={submit}>
                <div className="form-row">
                  <div className="form-field"><label className="form-label">Full Name</label><input className="form-input" placeholder="Your name" value={form.name} onChange={upd('name')} required/></div>
                  <div className="form-field"><label className="form-label">Company</label><input className="form-input" placeholder="Company name" value={form.company} onChange={upd('company')} required/></div>
                </div>
                <div className="form-row">
                  <div className="form-field"><label className="form-label">Email</label><input type="email" className="form-input" placeholder="you@company.com" value={form.email} onChange={upd('email')} required/></div>
                  <div className="form-field"><label className="form-label">Phone</label><input className="form-input" placeholder="+254 7xx xxx xxx" value={form.phone} onChange={upd('phone')}/></div>
                </div>
                <div className="form-row">
                  <div className="form-field"><label className="form-label">Service</label>
                    <select className="form-input" value={form.service} onChange={upd('service')} required>

                  </div>

                    <select className="form-input" value={form.budget} onChange={upd('budget')}>
